<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Cam Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .group-tag {
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 2rem 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16 / 9;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Footer / Social Links Styling */
        .footer-links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        .footer-links span {
            display: block;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="group-tag">CMPE 246 Group 15</div>
        <h1>Ecolens</h1>

        <div class="video-wrapper">
            <video id="video" controls autoplay muted playsinline></video>
        </div>

        <div class="footer-links">
            <a href="https://github.com/aaidenmel/CMPE-246" target="_blank" title="GitHub Repository">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
            </a>
            <a href="https://www.instagram.com/ecolens246/" target="_blank" title="Instagram">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const videoSrc = 'https://cmpe246.8745.cloudns.cl/live/cam/index.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    </script>

</body>
</html>
